@let opened = this.opened();

<mat-toolbar>
  <button mat-icon-button
  type="button"
  (click)="this.opened.set(!opened)">
    <mat-icon>menu</mat-icon>
  </button>

  <a routerLink="/">DUMMY INNOVA</a>
</mat-toolbar>

<mat-sidenav-container
(backdropClick)="this.opened.set(false)">
  <mat-sidenav [opened]="opened">
    <app-navbar
    (navigationEnd)="this.opened.set(false)">
    </app-navbar>
  </mat-sidenav>

  <mat-sidenav-content>
    <router-outlet>
    </router-outlet>
  </mat-sidenav-content>
</mat-sidenav-container>
