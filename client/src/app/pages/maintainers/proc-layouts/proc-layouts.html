<mat-card>
    <mat-card-header>
        <mat-card-title>Layouts</mat-card-title>
    </mat-card-header>

    <mat-card-content>
        <kendo-grid
        [data]="this.data"
        [skip]="this.skip"
        [sort]="this.sort"
        [filter]="this.filter"
        [loading]="this.loading"
        [pageSize]="this.pageSize"
        [sortable]="this.sortable"
        [pageable]="this.pageable"
        [columnMenu]="this.columnMenu"
        [filterable]="this.filterable"
        (pageChange)="this.onPageChange($event)"
        (sortChange)="this.onSortChange($event)"
        (filterChange)="this.onFilterChange($event)">
            <kendo-grid-column
            field="code"
            title="Code"
            [width]="160">
            </kendo-grid-column>

            <kendo-grid-column
            field="active"
            title="Active(?)"
            filter="boolean"
            [width]="128">
                <ng-template kendoGridCellTemplate let-item>
                    @if (item.active) {
                        <span [style.color]="'#10ff10'">True</span>
                    } @else {
                        <span [style.color]="'#c30000'">False</span>
                    }
                </ng-template>
            </kendo-grid-column>

            <kendo-grid-column
            field="name"
            title="Name"
            [width]="320">
            </kendo-grid-column>

            <kendo-grid-column
            [width]="160"
            [columnMenu]="false">
                <ng-template kendoGridHeaderTemplate>
                    <button mat-icon-button
                    type="button"
                    color="primary"
                    (click)="this.set()">
                        <mat-icon>add</mat-icon>
                    </button>

                    <button mat-icon-button
                    type="button"
                    color="tertiary"
                    (click)="this.update()">
                        <mat-icon
                        [class.spin]="this.loading">sync</mat-icon>
                    </button>
                </ng-template>

                <ng-template kendoGridCellTemplate let-item>
                    <button mat-icon-button
                    type="button"
                    color="secondary"
                    (click)="this.set(item)">
                        <mat-icon>edit</mat-icon>
                    </button>

                    <button mat-icon-button
                    type="button"
                    color="error"
                    (click)="this.delete(item)">
                        <mat-icon>close</mat-icon>
                    </button>
                </ng-template>
            </kendo-grid-column>
        </kendo-grid>
    </mat-card-content>
</mat-card>
