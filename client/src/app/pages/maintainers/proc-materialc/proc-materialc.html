<mat-card>
    <mat-card-header>
        <mat-card-title
        [style.margin-bottom]="!this.material ? '1.5rem' : 'unset'">Material Settings</mat-card-title>
        @if (this.material) {
            <mat-card-subtitle>{{ this.material.code }} - {{ this.material.name }}</mat-card-subtitle>
        }
    </mat-card-header>

    <mat-card-content>
        <kendo-grid
        [data]="this.data"
        [skip]="this.skip"
        [sort]="this.sort"
        [filter]="this.filter"
        [loading]="this.loading"
        [pageSize]="this.pageSize"
        [sortable]="this.sortable"
        [pageable]="this.pageable"
        [columnMenu]="{ columnChooser: false }"
        [filterable]="this.filterable"
        (pageChange)="this.onPageChange($event)"
        (sortChange)="this.onSortChange($event)"
        (filterChange)="this.onFilterChange($event)">
            <kendo-grid-column
            field="code"
            title="Customer Code"
            [width]="180">
            </kendo-grid-column>

            <kendo-grid-column
            field="name"
            title="Customer Name"
            [width]="320">
            </kendo-grid-column>

            <kendo-grid-column
            field="hasSettings"
            title="Setled(?)"
            filter="boolean"
            [width]="135">
                <ng-template kendoGridCellTemplate let-item>
                    @switch (item.hasSettings) {
                        @case (true) {
                            <span [style.color]="'#10ff10'">True</span>
                        }
    
                        @case (false) {
                            <span [style.color]="'#c30000'">False</span>
                        }
                    }
                </ng-template>
            </kendo-grid-column>

            <kendo-grid-column
            field="procMaterialcActive"
            title="Active"
            filter="boolean"
            [width]="112">
                <ng-template kendoGridCellTemplate let-item>
                    @switch (item.procMaterialcActive) {
                        @case (true) {
                            <span [style.color]="'#10ff10'">True</span>
                        }
    
                        @case (false) {
                            <span [style.color]="'#c30000'">False</span>
                        }
                    }
                </ng-template>
            </kendo-grid-column>

            <kendo-grid-column
            field="procMaterialcDescription1"
            title="Description"
            filter="text"
            [width]="320">
            </kendo-grid-column>

            <kendo-grid-column
            field="procMaterialcExpire1"
            title="Expire"
            filter="numeric"
            [width]="128">
            </kendo-grid-column>

            <kendo-grid-column
            field="expire1methodCode"
            title="Expire Method Code"
            filter="text"
            [width]="220">
            </kendo-grid-column>

            <kendo-grid-column
            field="expire1methodName"
            title="Expire Method Name"
            filter="text"
            [width]="220">
            </kendo-grid-column>

            <kendo-grid-column
            field="procMaterialcPacksizeum"
            title="Package's Measure Unit"
            [width]="260">
            </kendo-grid-column>

            <kendo-grid-column
            field="procMaterialcStacksizeum"
            title="Pile's Measure Unit"
            [width]="260">
            </kendo-grid-column>

            <kendo-grid-column
            field="procMaterialcPalletpsizeum"
            title="Package's Pallet Measure Unit"
            [width]="260">
            </kendo-grid-column>

            <kendo-grid-column
            field="procMaterialcPalletssizeum"
            title="Pile's Package Measure Unit"
            [width]="260">
            </kendo-grid-column>

            <kendo-grid-column
            field="packagingCode"
            title="Packaging Code"
            [width]="240">
            </kendo-grid-column>

            <kendo-grid-column
            field="packagingName"
            title="Packaging Name"
            [width]="240">
            </kendo-grid-column>

            <kendo-grid-column
            field="pkPackagingCode"
            title="PK Packaging Code"
            [width]="240">
            </kendo-grid-column>

            <kendo-grid-column
            field="pkPackagingName"
            title="PK Packaging Name"
            [width]="240">
            </kendo-grid-column>

            <kendo-grid-column
            field="itPackagingCode"
            title="IT Packaging Code"
            [width]="240">
            </kendo-grid-column>

            <kendo-grid-column
            field="itPackagingName"
            title="IT Packaging Name"
            [width]="240">
            </kendo-grid-column>

            <kendo-grid-column
            field="procLayoutITCode"
            title="IT Layout Code"
            [width]="240">
            </kendo-grid-column>

            <kendo-grid-column
            field="procLayoutITName"
            title="IT Layout Name"
            [width]="240">
            </kendo-grid-column>

            <kendo-grid-column
            field="procLayoutPKCode"
            title="PK Layout Code"
            [width]="240">
            </kendo-grid-column>

            <kendo-grid-column
            field="procLayoutPKName"
            title="PK Layout Name"
            [width]="240">
            </kendo-grid-column>

            <kendo-grid-column
            [width]="160"
            [sticky]="true"
            [columnMenu]="false">
                <ng-template kendoGridHeaderTemplate>
                    <button mat-icon-button
                    type="button"
                    color="tertiary"
                    (click)="this.update()">
                        <mat-icon
                        [class.spin]="this.loading">sync</mat-icon>
                    </button>
                </ng-template>

                <ng-template kendoGridCellTemplate let-item>
                    @if (item.hasSettings) {
                        <button mat-icon-button
                        type="button"
                        color="primary"
                        (click)="this.set(item.id)">
                            <mat-icon>edit</mat-icon>
                        </button>

                        <button mat-icon-button
                        type="button"
                        color="warn"
                        (click)="this.delete(item.materialcId)">
                            <mat-icon>delete</mat-icon>
                        </button>
                    } @else {
                        <button mat-icon-button
                        type="button"
                        color="primary"
                        (click)="this.set()">
                            <mat-icon>add</mat-icon>
                        </button>
                    }
                </ng-template>
            </kendo-grid-column>
        </kendo-grid>
    </mat-card-content>
</mat-card>
